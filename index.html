<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yulia & Yahya</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <div class="hero">
      <div class="ornament">∞</div>
      <h1>Yulia & Yahya</h1>
      <p>Wedding Photobooth</p>
    </div>

    <!-- FRAME PREVIEW -->
    <div class="preview-container">
      <div class="photo-area" id="photoArea">
        <video id="video" autoplay playsinline muted></video>
        <img id="preview" alt="" />
        <div class="focus-ring" id="focusRing"></div>
        <div class="placeholder" id="placeholder">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>Upload or open camera</span>
        </div>
      </div>
      <img src="frame.png" class="frame-overlay" alt="" />
    </div>

    <!-- HOW TO USE -->
    <div class="howto">
      <div class="howto-step">
        <span class="step-num">1</span>
        <span>Upload foto atau buka kamera</span>
      </div>
      <div class="howto-step">
        <span class="step-num">2</span>
        <span>Tekan capture untuk ambil foto</span>
      </div>
      <div class="howto-step">
        <span class="step-num">3</span>
        <span>Simpan &amp; bagikan momennya</span>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">

      <!-- Upload row -->
      <label class="btn btn-ghost" for="upload">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload Photo
      </label>
      <input type="file" id="upload" accept="image/*" />

      <!-- Camera group -->
      <div class="camera-group">
        <select id="cameraMode" class="btn btn-ghost select-inline">
          <option value="user">Front Camera</option>
          <option value="environment">Back Camera</option>
        </select>
        <button id="startCamera" class="btn btn-ghost icon-btn" title="Open Camera">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          Open
        </button>
      </div>

      <!-- Capture -->
      <button id="takePhoto" class="btn btn-primary" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="3" fill="currentColor"/>
        </svg>
        Capture
      </button>

      <!-- Download -->
      <button id="download" class="btn btn-secondary" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Save Photo
      </button>

    </div>

    <div class="footer">Captured with love</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
