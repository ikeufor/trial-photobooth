<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Photobox</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <div class="hero">
  <h1>Nama & Nama</h1>
  <p>Wedding Photobooth</p>
</div>

    <div class="controls">

      <input
        type="file"
        id="upload"
        accept="image/*"
      >

      <select id="cameraMode">
        <option value="user">Front Camera</option>
        <option value="environment">Back Camera</option>
      </select>

      <button id="startCamera">
        Open Camera
      </button>

      <button id="takePhoto">
        Capture
      </button>

      <button id="download">
        Download
      </button>

    </div>

    <video
      id="video"
      autoplay
      playsinline
      muted
    ></video>

    <canvas id="canvas"></canvas>

    <div class="footer">
  CAPTURED WITH LOVE
</div>
    
  </div>

  <script src="script.js"></script>

</body>
</html>
